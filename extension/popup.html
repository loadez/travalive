<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: dark; }
    body {
      width: 240px; margin: 0; padding: 14px;
      background: #111; color: #eee;
      font: 13px/1.4 system-ui, sans-serif;
    }
    h1 { font-size: 14px; margin: 0 0 2px; }
    .sub { color: #888; font-size: 11px; margin: 0 0 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
    .big { font: 600 22px/1 ui-monospace, monospace; color: #39ff14; }
    input[type=range] { width: 100%; accent-color: #39ff14; }
    .hint { color: #777; font-size: 11px; margin-top: 10px; }
    .lat { color: #39ff14; font-size: 11px; margin: 7px 0 0; }
    .by { text-align: center; color: #666; font-size: 11px; margin: 14px 0 0; }
    .by a { color: #39ff14; text-decoration: none; }
    .by a:hover { text-decoration: underline; }
    label.sw { position: relative; display: inline-block; width: 42px; height: 22px; }
    label.sw input { display: none; }
    .slider { position: absolute; inset: 0; background: #444; border-radius: 22px; transition: .15s; }
    .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .15s; }
    input:checked + .slider { background: #2a7d2a; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <h1>TravaLive</h1>
  <p class="sub" data-i18n="popupSubtitle">Hold live at a fixed delay. Friends pick the same number → synced.</p>

  <div class="row">
    <span data-i18n="enabled">Enabled</span>
    <label class="sw"><input type="checkbox" id="enabled"><span class="slider"></span></label>
  </div>

  <div class="row">
    <span data-i18n="debugHud">Debug HUD</span>
    <label class="sw"><input type="checkbox" id="hud"><span class="slider"></span></label>
  </div>

  <div class="row">
    <span id="tLabel" data-i18n="targetDelay">Default delay</span>
    <span class="big"><span id="val">10</span>s</span>
  </div>
  <input type="range" id="target" min="1" max="60" step="1" value="10">

  <p class="lat" id="latInfo" hidden></p>

  <p class="hint" data-i18n="popupHint">Everyone sets the same number → synced. Each live remembers its own delay. Can't go below the stream's real latency floor.</p>

  <p class="by"><span data-i18n="madeBy">made by</span> <a id="byLink" href="https://loadez.dev.br" target="_blank" rel="noopener">loadez</a></p>

  <script src="popup.js"></script>
</body>
</html>
